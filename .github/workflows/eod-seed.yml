name: Seed EOD Prices

on:
  schedule:
    - cron: '1 10 * * 1-5'   # 3:31 PM IST Mon-Fri (10:01 UTC)
    - cron: '31 10 * * 1-5'  # 4:01 PM IST Mon-Fri (10:31 UTC)
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger (optional)'
        required: false
        default: 'Manual EOD seed'

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger EOD cron
        run: |
          body=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://bajaj-pair-trade-iyzo.vercel.app/api/cron/eod)
          echo "Response: $body"
          if echo "$body" | grep -q '"success":true\|"skipped":true\|"date"'; then
            echo "EOD seed succeeded"
          else
            echo "EOD seed failed"
            exit 1
          fi
