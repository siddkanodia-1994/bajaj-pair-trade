name: Seed EOD Prices

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger (optional)'
        required: false
        default: 'Manual EOD seed'

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger EOD cron
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://bajaj-pair-trade-iyzo.vercel.app/api/cron/eod)
          echo "Response: $response"
          if [ "$response" != "200" ]; then
            echo "EOD seed failed with HTTP $response"
            exit 1
          fi
          echo "EOD seed succeeded"
