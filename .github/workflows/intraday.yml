name: Intraday Spread Ticks

on:
  schedule:
    # Every 5 minutes from 3:10–10:25 UTC Mon–Fri (~8:40 AM–3:55 PM IST)
    # Route enforces the precise 9:15–15:30 IST guard internally
    - cron: '10,15,20,25,30,35,40,45,50,55 3 * * 1-5'
    - cron: '*/5 4-9 * * 1-5'
    - cron: '0,5,10,15,20,25 10 * * 1-5'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger (optional)'
        required: false
        default: 'Manual intraday tick'

jobs:
  tick:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger intraday cron
        run: |
          body=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://bajaj-pair-trade-iyzo.vercel.app/api/cron/intraday)
          echo "Response: $body"
          if echo "$body" | grep -q '"success":true\|"skipped":true'; then
            echo "Intraday tick succeeded"
          else
            echo "Intraday tick failed"
            exit 1
          fi
