name: Renew Dhan Token

on:
  schedule:
    - cron: '30 0 * * *'   # 06:00 AM IST (00:30 UTC)
    - cron: '45 10 * * *'  # 04:15 PM IST (10:45 UTC)
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger (optional)'
        required: false
        default: 'Manual token renewal'

jobs:
  renew:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger renew-token cron
        run: |
          body=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://bajaj-pair-trade-iyzo.vercel.app/api/cron/renew-token)
          echo "Response: $body"
          if echo "$body" | grep -q '"success":true\|"skipped":true'; then
            echo "Token renewal succeeded (or skipped — already renewed)"
          else
            echo "Token renewal failed"
            exit 1
          fi
